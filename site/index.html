<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helena & Teodor's Game Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="confetti" id="confetti"></div>

  <header>
    <div class="title-block">
      <div class="flask-icon" aria-hidden="true">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <path d="M30 10 h20 v18 l18 32 c2 4-1 8-5 8H17c-4 0-7-4-5-8l18-32z" fill="#7c4dff" stroke="#512da8" stroke-width="2.5"/>
          <rect x="28" y="6" width="24" height="8" rx="3" fill="#b388ff" stroke="#7c4dff" stroke-width="2"/>
          <ellipse cx="40" cy="55" rx="14" ry="6" fill="#e040fb" opacity="0.6"/>
          <circle cx="33" cy="48" r="3" fill="#ffff00" class="bubble b1"/>
          <circle cx="44" cy="52" r="2" fill="#76ff03" class="bubble b2"/>
          <circle cx="38" cy="44" r="2.5" fill="#00e5ff" class="bubble b3"/>
        </svg>
      </div>
      <div>
        <h1>Helena & Teodor's</h1>
        <h2>Game Lab</h2>
      </div>
    </div>
    <p class="tagline">🎮 Games made by kids &bull; powered by code &bull; fuelled by fun 🚀</p>
  </header>

  <main>
    <div class="games-grid" id="games-grid"></div>
    <p class="loading" id="loading">🔬 Mixing up the games...</p>
    <p class="no-games" id="no-games" style="display:none;">
      No games yet — the lab is warming up! 🧪🔥
    </p>
  </main>

  <footer>
    <div class="footer-characters">
      <span class="char char-1">🧑‍🔬</span>
      <span class="char char-2">👩‍🔬</span>
    </div>
    <p>Built with ❤️ by Helena & Teodor</p>
  </footer>

  <script>
    // Floating confetti particles
    const confettiEl = document.getElementById('confetti');
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6','#ff9f43','#a29bfe','#00cec9'];
    const shapes = ['●','▲','■','★','♦'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      p.textContent = shapes[Math.floor(Math.random() * shapes.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.color = colors[Math.floor(Math.random() * colors.length)];
      p.style.fontSize = (Math.random() * 24 + 16) + 'px';
      p.style.animationDuration = (Math.random() * 8 + 6) + 's';
      p.style.animationDelay = (Math.random() * 5) + 's';
      confettiEl.appendChild(p);
    }

    // Load games
    async function loadGames() {
      const grid = document.getElementById('games-grid');
      const loading = document.getElementById('loading');
      const noGames = document.getElementById('no-games');

      try {
        const res = await fetch('games.json');
        const games = await res.json();
        loading.style.display = 'none';

        if (games.length === 0) {
          noGames.style.display = 'block';
          return;
        }

        const cardColors = [
          { bg: '#fff3e0', border: '#ff9800', badge: '#e65100' },
          { bg: '#e8f5e9', border: '#4caf50', badge: '#1b5e20' },
          { bg: '#e3f2fd', border: '#2196f3', badge: '#0d47a1' },
          { bg: '#fce4ec', border: '#e91e63', badge: '#880e4f' },
          { bg: '#f3e5f5', border: '#9c27b0', badge: '#4a148c' },
          { bg: '#e0f7fa', border: '#00bcd4', badge: '#006064' },
        ];

        games.forEach((game, i) => {
          const c = cardColors[i % cardColors.length];
          const card = document.createElement('a');
          card.href = `games/${game.folder}/`;
          card.className = 'game-card';
          card.style.setProperty('--card-bg', c.bg);
          card.style.setProperty('--card-border', c.border);
          card.style.setProperty('--card-badge', c.badge);
          card.style.animationDelay = (i * 0.12) + 's';

          const number = String(i + 1).padStart(2, '0');

          card.innerHTML = `
            <div class="card-number">#${number}</div>
            <div class="card-emoji">${game.emoji || '🎮'}</div>
            <h3>${game.title}</h3>
            <p>${game.description}</p>
            <div class="card-author">${game.author ? 'by ' + game.author : ''}</div>
            <div class="play-btn">
              <span class="play-text">PLAY!</span>
              <span class="play-arrow">▶</span>
            </div>
          `;

          grid.appendChild(card);
        });
      } catch (e) {
        loading.style.display = 'none';
        noGames.style.display = 'block';
      }
    }

    loadGames();
  </script>
</body>
</html>
